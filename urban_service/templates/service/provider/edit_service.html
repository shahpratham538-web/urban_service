{% extends "base.html" %}

{% block content %}

<h2>Edit Service: {{ service.serviceName }}</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
    <a href="{% url 'provider_services' %}">Cancel</a>
</form>

{% endblock %}
