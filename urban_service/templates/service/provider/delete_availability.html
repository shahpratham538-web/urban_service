{% extends "base.html" %}

{% block content %}

<h2>Delete Availability Slot</h2>

<p>Are you sure you want to delete this slot?</p>
<p><strong>{{ slot.get_day_of_week_display }}:</strong> {{ slot.start_time }} – {{ slot.end_time }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" style="color:red;">Yes, Delete</button>
    <a href="{% url 'manage_availability' %}">Cancel</a>
</form>

{% endblock %}
